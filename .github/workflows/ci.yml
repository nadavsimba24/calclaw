name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Install Rust
      run: |
        curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
        echo "$HOME/.cargo/bin" >> $GITHUB_PATH
    
    - name: Cache dependencies
      uses: actions/cache@v3
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
    
    - name: Build
      run: cargo build --verbose
    
    - name: Run tests
      run: cargo test --verbose
    
    - name: Check formatting
      run: cargo fmt -- --check
    
    - name: Clippy lint
      run: cargo clippy -- -D warnings
    
    - name: Build release
      run: cargo build --release

  docker:
    runs-on: ubuntu-latest
    needs: build
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Login to Docker Hub
      if: github.event_name == 'push'
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
    
    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: ${{ github.event_name == 'push' }}
        tags: |
          yourusername/calclaw:latest
          yourusername/calclaw:${{ github.sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

  release:
    runs-on: ubuntu-latest
    needs: [build, docker]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Rust
      run: |
        curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
        echo "$HOME/.cargo/bin" >> $GITHUB_PATH
    
    - name: Build release binaries
      run: |
        cargo build --release
        mkdir -p release
        cp target/release/calclaw release/calclaw-linux-x86_64
        strip release/calclaw-linux-x86_64
    
    - name: Create DEB package
      run: |
        mkdir -p debian/DEBIAN
        cat > debian/DEBIAN/control << EOF
        Package: calclaw
        Version: ${GITHUB_REF#refs/tags/v}
        Section: utils
        Priority: optional
        Architecture: amd64
        Maintainer: Your Name <your@email.com>
        Description: CalcLaw Complete - Enterprise AI Assistant
         Enterprise AI Assistant with Hebrew Support, NVIDIA AI, TTS, and Skills System
        EOF
        
        mkdir -p debian/usr/local/bin
        mkdir -p debian/etc/calclaw
        mkdir -p debian/var/lib/calclaw
        
        cp release/calclaw-linux-x86_64 debian/usr/local/bin/calclaw
        cp config.example.toml debian/etc/calclaw/config.toml
        
        chmod 755 debian/usr/local/bin/calclaw
        
        dpkg-deb --build debian release/calclaw_amd64.deb
    
    - name: Create release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          release/calclaw-linux-x86_64
          release/calclaw_amd64.deb
        generate_release_notes: true