name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  create-release:
    runs-on: ubuntu-latest
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
      version: ${{ steps.get_version.outputs.version }}

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Get version from tag
      id: get_version
      run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
    
    - name: Create Release
      id: create_release
      uses: softprops/action-gh-release@v1
      with:
        name: CalcLaw Complete ${{ steps.get_version.outputs.version }}
        draft: false
        prerelease: false
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    runs-on: ubuntu-latest
    needs: create-release
    strategy:
      matrix:
        target: [x86_64-unknown-linux-gnu]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install Rust
      run: |
        curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
        echo "$HOME/.cargo/bin" >> $GITHUB_PATH
    
    - name: Cache dependencies
      uses: actions/cache@v3
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
    
    - name: Build release
      run: |
        ./build-with-version.sh
    
    - name: Upload release assets
      run: |
        gh release upload ${{ needs.create-release.outputs.version }} \
          release/calclaw-linux-x86_64 \
          release/calclaw-v${{ needs.create-release.outputs.version }}-linux-x86_64.tar.gz \
          release/calclaw_${{ needs.create-release.outputs.version }}_amd64.deb \
          release/version.json \
          --repo ${{ github.repository }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  docker:
    runs-on: ubuntu-latest
    needs: [create-release, build]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
    
    - name: Get version from tag
      id: get_version
      run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
    
    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: |
          ${{ secrets.DOCKER_USERNAME }}/calclaw:latest
          ${{ secrets.DOCKER_USERNAME }}/calclaw:${{ steps.get_version.outputs.version }}
        labels: |
          org.opencontainers.image.version=${{ steps.get_version.outputs.version }}
          org.opencontainers.image.created=${{ steps.get_version.outputs.created }}
          org.opencontainers.image.revision=${{ github.sha }}
          org.opencontainers.image.licenses=MIT
        cache-from: type=gha
        cache-to: type=gha,mode=max

  notify:
    runs-on: ubuntu-latest
    needs: [create-release, build, docker]
    if: always()
    
    steps:
    - name: Send success notification
      if: success()
      run: |
        echo "✅ Release ${{ needs.create-release.outputs.version }} created successfully!"
        echo "📦 Assets uploaded to GitHub Releases"
        echo "🐳 Docker image pushed to Docker Hub"
    
    - name: Send failure notification
      if: failure()
      run: |
        echo "❌ Release failed!"
        echo "Check the workflow run for details: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"