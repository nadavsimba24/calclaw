version: '3.8'

services:
  # Calclaw main service
  calclaw:
    build:
      context: .
      dockerfile: Dockerfile
    image: calclaw/calclaw:latest
    container_name: calclaw
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - RUST_LOG=info
      - PORT=3000
      - HOST=0.0.0.0
      - DATA_DIR=/app/data
      - LOG_DIR=/app/logs
      - CONFIG_DIR=/app/config
    volumes:
      - calclaw_data:/app/data
      - calclaw_logs:/app/logs
      - ./config:/app/config:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    networks:
      - calclaw-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.calclaw.rule=Host(`calclaw.local`)"
      - "traefik.http.services.calclaw.loadbalancer.server.port=3000"

  # Ollama for local AI models
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
    environment:
      - OLLAMA_KEEP_ALIVE=24h
      - OLLAMA_HOST=0.0.0.0
    deploy:
      resources:
        limits:
          memory: 8G
        reservations:
          memory: 4G
    networks:
      - calclaw-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 30s

  # PostgreSQL for data storage (optional)
  postgres:
    image: postgres:15-alpine
    container_name: calclaw-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_DB=calclaw
      - POSTGRES_USER=calclaw
      - POSTGRES_PASSWORD=calclaw_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - calclaw-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U calclaw"]
      interval: 30s
      timeout: 3s
      retries: 3

  # Redis for caching (optional)
  redis:
    image: redis:7-alpine
    container_name: calclaw-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - calclaw-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 3s
      retries: 3

  # Traefik for reverse proxy (optional)
  traefik:
    image: traefik:v3.0
    container_name: traefik
    restart: unless-stopped
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
    ports:
      - "80:80"
      - "8080:8080"  # Traefik dashboard
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - calclaw-network

  # Prometheus for monitoring (optional)
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    ports:
      - "9090:9090"
    networks:
      - calclaw-network

  # Grafana for dashboards (optional)
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_INSTALL_PLUGINS=grafana-piechart-panel
    volumes:
      - grafana_data:/var/lib/grafana
      - ./config/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./config/grafana/datasources:/etc/grafana/provisioning/datasources
    ports:
      - "3001:3000"
    networks:
      - calclaw-network
    depends_on:
      - prometheus

volumes:
  calclaw_data:
    driver: local
  calclaw_logs:
    driver: local
  ollama_models:
    driver: local
  postgres_data:
    driver: local
  redis_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

networks:
  calclaw-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16